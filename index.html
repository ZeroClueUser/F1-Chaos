<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 GridRival Chaos-Caster V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-color: #3b82f6; 
            --panel-bg: rgba(15, 23, 42, 0.85);
            --font-main: 'ui-sans-serif', system-ui, sans-serif;
            --glitch-anim: none;
        }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            transition: font-family 0.3s ease;
        }

        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1s ease-in-out, filter 0.5s ease;
            filter: brightness(0.4);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
            animation: var(--glitch-anim);
        }

        input[type=range] {
            accent-color: var(--accent-color);
            transition: accent-color 0.3s ease;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        /* Hover effect for selectable drivers */
        .driver-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .driver-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .selected-driver {
            border: 2px solid var(--accent-color) !important;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-6">

    <div id="bg-layer"></div>

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-2/3">
            <header class="glass-panel p-6 rounded-xl mb-6 text-center">
                <h1 class="text-4xl font-extrabold mb-4 uppercase tracking-wider" style="color: var(--accent-color)">
                    Chaos-Caster Engine
                </h1>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 uppercase tracking-widest text-gray-300">
                        Vibe Level: <span id="vibe-label" class="text-white">0% (The Engineer)</span>
                    </label>
                    <input type="range" id="vibe-slider" min="0" max="100" value="0" class="w-full h-3 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <div class="flex justify-between text-xs text-gray-400 font-mono uppercase mb-6">
                    <span>Pure Stats</span>
                    <span>Hype / Lifestyle</span>
                    <span>Unfiltered Reddit</span>
                </div>

                <button onclick="bootEngine()" id="boot-btn" class="px-8 py-3 rounded font-bold text-white uppercase tracking-wider transition-all hover:scale-105" style="background-color: var(--accent-color)">
                    Initialize System
                </button>
                <div id="status" class="mt-4 font-mono text-sm text-gray-400 italic">Awaiting initialization...</div>
            </header>

            <div id="grid-results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div class="w-full lg:w-1/3">
            <div class="glass-panel p-6 rounded-xl sticky top-6">
                <h2 class="text-2xl font-bold uppercase mb-2 border-b border-gray-600 pb-2" style="color: var(--accent-color)">
                    Your Squad (5/5)
                </h2>
                <div class="flex justify-between items-end mb-4">
                    <span class="text-sm text-gray-400 uppercase">Total Predicted Chaos Score</span>
                    <span id="squad-total" class="text-4xl font-mono font-bold" style="color: var(--accent-color)">0.0</span>
                </div>
                
                <div id="squad-list" class="space-y-3">
                    <div class="text-center text-gray-500 italic py-8">Select drivers from the grid to build your squad.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // System State
        let drivers = [];
        let scoredDrivers = []; // Holds the active calculation
        let squadIds = []; // Holds driver_numbers
        let backgrounds = { engineer: [], paddock: [], oracle: [] };
        let memeImages = [];
        let currentBgIndex = 0;
        let bgInterval;

        const slider = document.getElementById('vibe-slider');
        const vibeLabel = document.getElementById('vibe-label');
        const bgLayer = document.getElementById('bg-layer');
        const rootStyles = document.documentElement.style;

        // Vibe Change Listener
        slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            updateVibeState(val);
            if(drivers.length > 0) {
                calculateScores();
                renderDrivers();
                renderSquad();
            }
        });

        function updateVibeState(val) {
            if (val < 34) {
                vibeLabel.innerText = `${val}% (The Engineer)`;
                rootStyles.setProperty('--accent-color', '#3b82f6');
                rootStyles.setProperty('--panel-bg', 'rgba(15, 23, 42, 0.85)');
                rootStyles.setProperty('--font-main', "'ui-sans-serif', system-ui, sans-serif");
                rootStyles.setProperty('--glitch-anim', 'none');
                bgLayer.style.filter = "brightness(0.4) saturate(1)";
            } else if (val < 67) {
                vibeLabel.innerText = `${val}% (The Paddock)`;
                rootStyles.setProperty('--accent-color', '#ec4899');
                rootStyles.setProperty('--panel-bg', 'rgba(88, 28, 135, 0.80)');
                rootStyles.setProperty('--font-main', "'ui-sans-serif', system-ui, sans-serif");
                rootStyles.setProperty('--glitch-anim', 'none');
                bgLayer.style.filter = "brightness(0.5) saturate(1.5)";
            } else {
                vibeLabel.innerText = `${val}% (The Oracle)`;
                rootStyles.setProperty('--accent-color', '#22c55e');
                rootStyles.setProperty('--panel-bg', 'rgba(0, 0, 0, 0.90)');
                rootStyles.setProperty('--font-main', "'Courier New', monospace");
                rootStyles.setProperty('--glitch-anim', val > 90 ? 'glitch 0.3s infinite' : 'none');
                bgLayer.style.filter = "brightness(0.6) contrast(1.2) saturate(2)";
            }
            cycleBackground(); 
        }

        async function bootEngine() {
            document.getElementById('status').innerText = "Connecting to OpenF1 API...";
            document.getElementById('boot-btn').style.display = 'none';
            
            try {
                // Fetch Grid
                const dRes = await fetch('https://api.openf1.org/v1/drivers');
                const rawDrivers = await dRes.json();
                drivers = Array.from(new Set(rawDrivers.map(a => a.driver_number)))
                    .map(num => rawDrivers.find(a => a.driver_number === num))
                    .filter(d => d.driver_number).slice(0, 20);

                document.getElementById('status').innerText = "Scraping Multi-Node Reddit Networks...";
                
                // Parallel scraping for faster boot
                const [engBgs, padBgs, oraBgs] = await Promise.all([
                    scrapeMultipleSubs(['F1Porn', 'f1technical']),
                    scrapeMultipleSubs(['formula1', 'GrandPrixRacing']),
                    scrapeMultipleSubs(['formuladank', 'formulabuddyretard'])
                ]);

                backgrounds.engineer = engBgs;
                backgrounds.paddock = padBgs;
                backgrounds.oracle = oraBgs;
                memeImages = oraBgs; 

                document.getElementById('status').innerText = "System Fully Operational.";
                
                clearInterval(bgInterval);
                bgInterval = setInterval(cycleBackground, 8000);
                cycleBackground();

                calculateScores();
                renderDrivers();
                renderSquad();

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Critical Network Failure. Ensure CORS proxy is reachable.";
                document.getElementById('boot-btn').style.display = 'inline-block';
            }
        }

        async function scrapeMultipleSubs(subs) {
            let allImages = [];
            for (let sub of subs) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://www.reddit.com/r/${sub}/hot.json?limit=25`);
                    const json = await res.json();
                    let images = json.data.children
                        .map(post => post.data.url)
                        .filter(url => url.match(/\.(jpeg|jpg|png)$/i));
                    allImages = allImages.concat(images);
                } catch (e) {
                    console.warn(`Could not fetch r/${sub}`);
                }
            }
            return allImages.length > 0 ? allImages : ['https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=1000&auto=format&fit=crop'];
        }

        function cycleBackground() {
            const val = parseInt(slider.value);
            let activeArray = backgrounds.engineer;
            if (val >= 34 && val < 67) activeArray = backgrounds.paddock;
            if (val >= 67) activeArray = backgrounds.oracle;

            if (activeArray.length > 0) {
                currentBgIndex = (currentBgIndex + 1) % activeArray.length;
                bgLayer.style.backgroundImage = `url('${activeArray[currentBgIndex]}')`;
            }
        }

        function calculateScores() {
            const val = parseInt(slider.value);
            const V = val / 100.0; 

            scoredDrivers = drivers.map(d => {
                let sBase = 50; 
                if(['Red Bull Racing', 'Ferrari', 'McLaren', 'Mercedes'].includes(d.team_name)) sBase = 85;
                if(d.team_name === 'Aston Martin' || d.team_name === 'RB') sBase = 65;

                // Create a deterministic "meme score" based on driver number so it doesn't jump wildly unless wildcard hits
                let sMeme = ((d.driver_number * 13) % 90) + 10; 
                
                let finalScore = (sBase * (1 - V)) + (sMeme * V);
                
                let wildcardText = "";
                if (V > 0.8 && Math.random() > 0.85) {
                    let swing = (Math.random() > 0.5 ? 150 : -75);
                    finalScore += swing;
                    wildcardText = swing > 0 ? "🔥 VIRAL MEME BUFF" : "💀 TANKED BY REDDIT";
                }

                return { ...d, score: finalScore, wildcard: wildcardText };
            });

            scoredDrivers.sort((a, b) => b.score - a.score);
        }

        window.toggleSquad = function(driverNum) {
            if (squadIds.includes(driverNum)) {
                squadIds = squadIds.filter(id => id !== driverNum); // Remove
            } else {
                if (squadIds.length < 5) {
                    squadIds.push(driverNum); // Add
                } else {
                    alert("Your GridRival squad is full! Remove a driver first.");
                }
            }
            renderDrivers();
            renderSquad();
        }

        function renderDrivers() {
            const grid = document.getElementById('grid-results');
            const val = parseInt(slider.value);
            const V = val / 100.0;

            grid.innerHTML = scoredDrivers.map((d) => {
                let imageSrc = d.headshot_url || 'https://via.placeholder.com/150';
                if (V > 0.66 && memeImages.length > 0) {
                    imageSrc = memeImages[(d.driver_number * 7) % memeImages.length];
                }

                const isSelected = squadIds.includes(d.driver_number);
                const borderStyle = isSelected ? `border-color: var(--accent-color)` : `border-color: #${d.team_colour || 'ffffff'}`;

                return `
                <div onclick="toggleSquad(${d.driver_number})" class="glass-panel driver-card p-4 rounded-xl flex items-center space-x-4 border-l-8 ${isSelected ? 'selected-driver' : ''}" style="${borderStyle}">
                    <img src="${imageSrc}" alt="Driver" class="w-20 h-20 rounded-full object-cover border-2 border-gray-600 bg-gray-800">
                    <div class="flex-grow">
                        <div class="text-xs font-bold text-gray-400 uppercase">${d.team_name}</div>
                        <h3 class="text-xl font-bold">${d.full_name}</h3>
                        ${d.wildcard ? `<div class="text-xs font-bold text-yellow-400 mt-1">${d.wildcard}</div>` : ''}
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] uppercase tracking-widest text-gray-400">Predicted</div>
                        <div class="text-3xl font-mono font-bold" style="color: var(--accent-color)">
                            ${d.score.toFixed(1)}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderSquad() {
            const squadList = document.getElementById('squad-list');
            const squadTotal = document.getElementById('squad-total');
            
            if (squadIds.length === 0) {
                squadList.innerHTML = `<div class="text-center text-gray-500 italic py-8">Select drivers from the grid to build your squad.</div>`;
                squadTotal.innerText = "0.0";
                return;
            }

            let totalScore = 0;
            const squadHTML = squadIds.map(id => {
                const d = scoredDrivers.find(x => x.driver_number === id);
                if(!d) return '';
                totalScore += d.score;
                
                return `
                <div class="flex justify-between items-center bg-black bg-opacity-50 p-3 rounded border border-gray-700">
                    <div>
                        <span class="text-sm font-bold">${d.full_name}</span>
                        <span class="text-xs text-gray-400 block">${d.team_name}</span>
                    </div>
                    <div class="font-mono text-lg" style="color: var(--accent-color)">${d.score.toFixed(1)}</div>
                </div>`;
            }).join('');

            squadList.innerHTML = squadHTML;
            squadTotal.innerText = totalScore.toFixed(1);
        }
    </script>
</body>
</html>
