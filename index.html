<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos-Caster v7.0 | Full API Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #050505; --glass: rgba(10, 15, 25, 0.9); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; transition: all 0.4s ease; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--accent); border-radius: 4px; }
        .scanlines { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; z-index: 50; pointer-events: none; opacity: 0; }
        .driver-card { transition: 0.2s; cursor: pointer; border-left: 4px solid var(--accent); }
        .driver-card:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
        .selected { background: rgba(59, 130, 246, 0.15) !important; box-shadow: 0 0 15px var(--accent); border-width: 2px; }
        .glitch { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div id="scanlines" class="scanlines"></div>

    <div class="max-w-6xl mx-auto">
        <header class="glass p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 id="main-title" class="text-4xl font-black uppercase tracking-tighter" style="color: var(--accent)">Chaos-Caster Engine</h1>
                <p id="sub-title" class="text-[10px] tracking-[0.3em] uppercase opacity-50">GridRival War Room // Live API Linked</p>
            </div>
            <div class="flex gap-3">
                <button onclick="bootSystem()" id="boot-btn" class="bg-blue-600 px-8 py-3 font-black uppercase text-xs hover:bg-blue-500 transition-all">Initialize Data Link</button>
                <div id="save-tools" class="hidden flex gap-2">
                    <button onclick="exportSave()" class="border border-gray-700 px-4 py-2 text-[10px] uppercase font-bold hover:bg-gray-800">Export</button>
                    <button onclick="importSave()" class="border border-gray-700 px-4 py-2 text-[10px] uppercase font-bold hover:bg-gray-800">Import</button>
                </div>
            </div>
        </header>

        <div id="main-ui" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-8">
                <div class="glass p-4 mb-6">
                    <input type="range" id="vibe-slider" min="0" max="100" value="0" class="w-full accent-blue-600">
                    <div class="flex justify-between text-[9px] font-bold uppercase mt-2 opacity-60">
                        <span>Telemetry</span>
                        <span>Paddock Rumor</span>
                        <span>The Oracle</span>
                    </div>
                </div>

                <div class="flex justify-between items-end border-b border-gray-800 mb-4 pb-2">
                    <h2 class="font-black uppercase tracking-widest text-sm">Driver Market</h2>
                    <div id="api-status" class="text-[9px] font-mono text-yellow-500 uppercase">Connecting to OpenF1...</div>
                </div>
                <div id="driver-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-6 border-t-4 border-green-500">
                    <h3 class="text-[10px] uppercase tracking-widest opacity-60 mb-1">Available Capital</h3>
                    <div id="display-budget" class="text-5xl font-mono font-black text-green-400 mb-4">$100.0M</div>
                    
                    <div class="bg-black/40 p-3 rounded mb-6 flex justify-between items-center border border-gray-800">
                        <span class="text-[10px] uppercase opacity-50">Squad Value</span>
                        <span id="display-cost" class="font-mono font-bold">$0.0M</span>
                    </div>

                    <button onclick="simRace()" class="w-full bg-red-700 hover:bg-red-600 py-4 font-black uppercase tracking-tighter text-sm mb-2">Simulate Next Race</button>
                    <button onclick="resetData()" class="w-full text-[9px] uppercase opacity-40 hover:opacity-100 transition-all">Factory Reset System</button>
                </div>

                <div class="glass p-6">
                    <h3 class="text-xs font-black uppercase mb-4 border-b border-gray-800 pb-2">Active Squad (<span id="squad-count">0</span>/5)</h3>
                    <div id="squad-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KEY = 'CC_v7_DATA';
        let state = { budget: 100.0, squad: [], week: 1 };
        let drivers = [
            { id: 1, name: 'Verstappen', team: 'Red Bull', cost: 28.5, color: '#3671C6', abbr: 'VER' },
            { id: 4, name: 'Norris', team: 'McLaren', cost: 26.0, color: '#FF8000', abbr: 'NOR' },
            { id: 16, name: 'Leclerc', team: 'Ferrari', cost: 24.5, color: '#E8002D', abbr: 'LEC' },
            { id: 44, name: 'Hamilton', team: 'Ferrari', cost: 23.0, color: '#E8002D', abbr: 'HAM' },
            { id: 81, name: 'Piastri', team: 'McLaren', cost: 21.5, color: '#FF8000', abbr: 'PIA' },
            { id: 63, name: 'Russell', team: 'Mercedes', cost: 19.0, color: '#27F4D2', abbr: 'RUS' },
            { id: 14, name: 'Alonso', team: 'Aston Martin', cost: 15.0, color: '#229971', abbr: 'ALO' },
            { id: 55, name: 'Sainz', team: 'Williams', cost: 14.5, color: '#37BEDD', abbr: 'SAI' },
            { id: 11, name: 'Perez', team: 'Red Bull', cost: 14.0, color: '#3671C6', abbr: 'PER' },
            { id: 23, name: 'Albon', team: 'Williams', cost: 9.5, color: '#37BEDD', abbr: 'ALB' }
        ];
        let memes = [];

        // --- CORE ENGINES ---
        async function bootSystem() {
            document.getElementById('boot-btn').classList.add('hidden');
            document.getElementById('save-tools').classList.remove('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            
            loadLocal();
            attachListeners();
            await fetchF1Data();
            await fetchMemes();
            render();
        }

        async function fetchF1Data() {
            try {
                const res = await fetch('https://api.openf1.org/v1/drivers');
                const data = await res.json();
                if (data && data.length > 0) {
                    // Map live data onto our grid logic
                    data.slice(0, 20).forEach((live, i) => {
                        if (drivers[i]) {
                            drivers[i].name = live.last_name || drivers[i].name;
                            drivers[i].abbr = live.name_acronym || drivers[i].abbr;
                        }
                    });
                    document.getElementById('api-status').innerText = "OpenF1: Live Link Active";
                    document.getElementById('api-status').className = "text-[9px] font-mono text-green-500 uppercase";
                }
            } catch (e) {
                document.getElementById('api-status').innerText = "OpenF1: API Offline (Using 2026 Projections)";
            }
        }

        async function fetchMemes() {
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=https://www.reddit.com/r/formuladank/hot.json?limit=30`);
                const j = await res.json();
                memes = j.data.children.filter(c => c.data.url.match(/\.(jpg|png|jpeg)$/)).map(c => c.data.url);
            } catch (e) { console.warn("Memes blocked."); }
        }

        function render() {
            const v = document.getElementById('vibe-slider').value;
            const grid = document.getElementById('driver-grid');
            const root = document.documentElement.style;
            
            let mode = 0; // 0: Tech, 1: Rumor, 2: Oracle
            if (v > 33) mode = 1;
            if (v > 66) mode = 2;

            // Apply Theme
            if (mode === 0) {
                root.setProperty('--accent', '#3b82f6');
                document.getElementById('scanlines').style.opacity = '0';
            } else if (mode === 1) {
                root.setProperty('--accent', '#ec4899');
                document.getElementById('scanlines').style.opacity = '0.1';
            } else {
                root.setProperty('--accent', '#22c55e');
                document.getElementById('scanlines').style.opacity = '0.4';
            }

            grid.innerHTML = drivers.map(d => {
                const isSelected = state.squad.includes(d.id);
                let img = `<div class="w-12 h-12 bg-gray-800 flex items-center justify-center font-black text-xl" style="color:${d.color}">${d.abbr}</div>`;
                
                if (mode === 2 && memes.length > 0) {
                    img = `<img src="${memes[d.id % memes.length]}" class="w-12 h-12 object-cover border border-green-500">`;
                }

                let lore = `[TELEMETRY]: Sector 3 clipping issues detected.`;
                if (mode === 1) lore = `*Paddock whisper: ${d.name} unhappy with floor update.*`;
                if (mode === 2) lore = `THE PROPHECY DEMANDS CHAOS.`;

                return `
                    <div onclick="toggle(${d.id})" class="glass p-4 flex items-center gap-4 driver-card ${isSelected?'selected':''} ${mode===2?'glitch':''}">
                        ${img}
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <h4 class="font-black uppercase text-sm">${d.name}</h4>
                                <span class="text-[10px] font-mono text-green-400">$${d.cost}M</span>
                            </div>
                            <p class="text-[9px] opacity-50 uppercase mt-1 font-semibold">${d.team}</p>
                            <p class="text-[10px] mt-2 italic opacity-80">${lore}</p>
                        </div>
                    </div>
                `;
            }).join('');

            updateLedger();
        }

        function updateLedger() {
            const currentCost = state.squad.reduce((sum, id) => sum + drivers.find(d => d.id === id).cost, 0);
            document.getElementById('display-budget').innerText = `$${state.budget.toFixed(1)}M`;
            document.getElementById('display-cost').innerText = `$${currentCost.toFixed(1)}M`;
            document.getElementById('squad-count').innerText = state.squad.length;
            
            const list = document.getElementById('squad-list');
            list.innerHTML = state.squad.map(id => {
                const d = drivers.find(x => x.id === id);
                return `<div class="flex justify-between text-[10px] font-bold bg-white/5 p-2 border-l-2" style="border-color:${d.color}">
                    <span>${d.name.toUpperCase()}</span>
                    <span class="font-mono">$${d.cost}M</span>
                </div>`;
            }).join('');
        }

        // --- LOGIC ---
        window.toggle = (id) => {
            const d = drivers.find(x => x.id === id);
            const currentCost = state.squad.reduce((sum, sid) => sum + drivers.find(x => x.id === sid).cost, 0);
            
            if (state.squad.includes(id)) {
                state.squad = state.squad.filter(x => x !== id);
            } else {
                if (state.squad.length >= 5) return alert("Squad capacity reached.");
                if (currentCost + d.cost > state.budget) return alert("Budget exceeded.");
                state.squad.push(id);
            }
            saveLocal();
            render();
        };

        window.simRace = () => {
            if (state.squad.length < 5) return alert("You need a full squad of 5 to race.");
            const swing = (Math.random() * 10) - 4; // -$4M to +$6M
            state.budget += swing;
            state.week++;
            alert(`Race ${state.week-1} Result: ${swing > 0 ? 'Profit' : 'Loss'} of $${Math.abs(swing).toFixed(1)}M`);
            saveLocal();
            render();
        };

        function attachListeners() {
            document.getElementById('vibe-slider').addEventListener('input', render);
        }

        function saveLocal() { localStorage.setItem(KEY, JSON.stringify(state)); }
        function loadLocal() { 
            const s = localStorage.getItem(KEY); 
            if(s) state = JSON.parse(s); 
        }
        window.resetData = () => { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); }};
        window.exportSave = () => { prompt("Save String (Copy this):", btoa(JSON.stringify(state))); };
        window.importSave = () => { const s = prompt("Paste Save String:"); if(s) { state = JSON.parse(atob(s)); saveLocal(); render(); }};

    </script>
</body>
</html>
