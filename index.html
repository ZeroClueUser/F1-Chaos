<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 GridRival Chaos-Caster V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-color: #3b82f6; 
            --panel-bg: rgba(15, 23, 42, 0.85);
            --font-main: 'ui-sans-serif', system-ui, sans-serif;
            --glitch-anim: none;
        }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            transition: font-family 0.3s ease;
        }

        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1s ease-in-out, filter 0.5s ease;
            filter: brightness(0.4);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
            animation: var(--glitch-anim);
        }

        input[type=range] {
            accent-color: var(--accent-color);
            transition: accent-color 0.3s ease;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        .driver-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .driver-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .selected-driver {
            border: 2px solid var(--accent-color) !important;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .expired-contract {
            border: 2px solid #ef4444 !important; /* Red border */
            background: rgba(239, 68, 68, 0.2) !important;
        }
    </style>
</head>
<body class="p-6">

    <div id="bg-layer"></div>

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-2/3">
            <header class="glass-panel p-6 rounded-xl mb-6 text-center">
                <h1 class="text-4xl font-extrabold mb-4 uppercase tracking-wider" style="color: var(--accent-color)">
                    Chaos-Caster Engine
                </h1>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 uppercase tracking-widest text-gray-300">
                        Vibe Level: <span id="vibe-label" class="text-white">0% (The Engineer)</span>
                    </label>
                    <input type="range" id="vibe-slider" min="0" max="100" value="0" class="w-full h-3 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <div class="flex justify-between text-xs text-gray-400 font-mono uppercase mb-6">
                    <span>Pure Stats</span>
                    <span>Hype / Lifestyle</span>
                    <span>Unfiltered Reddit</span>
                </div>

                <div class="flex flex-wrap justify-center gap-4 mb-4">
                    <button onclick="bootEngine()" id="boot-btn" class="px-8 py-3 rounded font-bold text-white uppercase tracking-wider transition-all hover:scale-105" style="background-color: var(--accent-color)">
                        Initialize System
                    </button>
                    <button onclick="advanceRace()" id="advance-btn" class="hidden px-8 py-3 rounded font-bold text-white uppercase tracking-wider transition-all hover:scale-105 bg-gray-600 hover:bg-gray-500">
                        Advance to Next Race
                    </button>
                </div>
                <div id="status" class="mt-2 font-mono text-sm text-gray-400 italic">Awaiting initialization...</div>
            </header>

            <div id="grid-results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
        </div>

        <div class="w-full lg:w-1/3">
            <div class="glass-panel p-6 rounded-xl sticky top-6">
                <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-4">
                    <h2 id="squad-header" class="text-2xl font-bold uppercase" style="color: var(--accent-color)">
                        Your Squad (0/6)
                    </h2>
                </div>

                <div class="mb-6 bg-black bg-opacity-40 p-4 rounded-lg border border-gray-700">
                    <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Total Budget ($M)</label>
                    <input type="number" id="budget-input" value="100.0" step="0.1" class="w-full bg-gray-800 text-white p-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500 mb-2 font-mono">
                    
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Spent:</span>
                        <span id="budget-spent" class="font-mono text-red-400">$0.0M</span>
                    </div>
                    <div class="flex justify-between text-sm font-bold mt-1">
                        <span>Remaining:</span>
                        <span id="budget-remaining" class="font-mono text-green-400">$100.0M</span>
                    </div>
                </div>

                <div class="flex justify-between items-end mb-4">
                    <span class="text-sm text-gray-400 uppercase">Predicted Squad Chaos</span>
                    <span id="squad-total" class="text-4xl font-mono font-bold" style="color: var(--accent-color)">0.0</span>
                </div>
                
                <div id="squad-list" class="space-y-3">
                    <div class="text-center text-gray-500 italic py-8">Select drivers from the grid to build your squad.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // System State
        let drivers = [];
        let scoredDrivers = []; 
        let backgrounds = { engineer: [], paddock: [], oracle: [] };
        let currentBgIndex = 0;
        let bgInterval;

        // GridRival State
        let budget = 100.0;
        let squad = []; // Array of { id, contractLength, racesRemaining, isTalent }
        let driverSalaries = {}; // { driver_number: salary }

        const slider = document.getElementById('vibe-slider');
        const vibeLabel = document.getElementById('vibe-label');
        const bgLayer = document.getElementById('bg-layer');
        const rootStyles = document.documentElement.style;
        const budgetInput = document.getElementById('budget-input');

        // Load from Local Storage
        function loadState() {
            const savedSquad = localStorage.getItem('cr_squad');
            const savedBudget = localStorage.getItem('cr_budget');
            const savedSalaries = localStorage.getItem('cr_salaries');

            if (savedSquad) squad = JSON.parse(savedSquad);
            if (savedBudget) {
                budget = parseFloat(savedBudget);
                budgetInput.value = budget;
            }
            if (savedSalaries) driverSalaries = JSON.parse(savedSalaries);
        }

        function saveState() {
            localStorage.setItem('cr_squad', JSON.stringify(squad));
            localStorage.setItem('cr_budget', budget.toString());
            localStorage.setItem('cr_salaries', JSON.stringify(driverSalaries));
        }

        budgetInput.addEventListener('change', (e) => {
            budget = parseFloat(e.target.value) || 0;
            saveState();
            renderSquad();
        });

        // Vibe Change Listener
        slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            updateVibeState(val);
            if(drivers.length > 0) {
                calculateScores();
                renderDrivers();
                renderSquad();
            }
        });

        function updateVibeState(val) {
            if (val < 34) {
                vibeLabel.innerText = `${val}% (The Engineer)`;
                rootStyles.setProperty('--accent-color', '#3b82f6');
                rootStyles.setProperty('--panel-bg', 'rgba(15, 23, 42, 0.85)');
                rootStyles.setProperty('--font-main', "'ui-sans-serif', system-ui, sans-serif");
                rootStyles.setProperty('--glitch-anim', 'none');
                bgLayer.style.filter = "brightness(0.4) saturate(1)";
            } else if (val < 67) {
                vibeLabel.innerText = `${val}% (The Paddock)`;
                rootStyles.setProperty('--accent-color', '#ec4899');
                rootStyles.setProperty('--panel-bg', 'rgba(88, 28, 135, 0.80)');
                rootStyles.setProperty('--font-main', "'ui-sans-serif', system-ui, sans-serif");
                rootStyles.setProperty('--glitch-anim', 'none');
                bgLayer.style.filter = "brightness(0.5) saturate(1.5)";
            } else {
                vibeLabel.innerText = `${val}% (The Oracle)`;
                rootStyles.setProperty('--accent-color', '#22c55e');
                rootStyles.setProperty('--panel-bg', 'rgba(0, 0, 0, 0.90)');
                rootStyles.setProperty('--font-main', "'Courier New', monospace");
                rootStyles.setProperty('--glitch-anim', val > 90 ? 'glitch 0.3s infinite' : 'none');
                bgLayer.style.filter = "brightness(0.6) contrast(1.2) saturate(2)";
            }
            cycleBackground(); 
        }

        async function bootEngine() {
            loadState();
            document.getElementById('status').innerText = "Connecting to OpenF1 API...";
            document.getElementById('boot-btn').style.display = 'none';
            document.getElementById('advance-btn').style.display = 'inline-block';
            
            try {
                // Fetch Grid
                const dRes = await fetch('https://api.openf1.org/v1/drivers');
                const rawDrivers = await dRes.json();
                drivers = Array.from(new Set(rawDrivers.map(a => a.driver_number)))
                    .map(num => rawDrivers.find(a => a.driver_number === num))
                    .filter(d => d.driver_number).slice(0, 20);

                // Initialize default salaries if missing
                drivers.forEach(d => {
                    if (!driverSalaries[d.driver_number]) {
                        driverSalaries[d.driver_number] = parseFloat((10 + (d.driver_number % 15)).toFixed(1));
                    }
                });

                document.getElementById('status').innerText = "Scraping Multi-Node Reddit Networks...";
                
                const [engBgs, padBgs, oraBgs] = await Promise.all([
                    scrapeMultipleSubs(['F1Porn', 'f1technical']),
                    scrapeMultipleSubs(['formula1', 'GrandPrixRacing']),
                    scrapeMultipleSubs(['formuladank', 'formulabuddyretard'])
                ]);

                backgrounds.engineer = engBgs;
                backgrounds.paddock = padBgs;
                backgrounds.oracle = oraBgs;

                document.getElementById('status').innerText = "System Fully Operational.";
                
                clearInterval(bgInterval);
                bgInterval = setInterval(cycleBackground, 8000);
                cycleBackground();

                calculateScores();
                renderDrivers();
                renderSquad();

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Critical Network Failure. Ensure CORS proxy is reachable.";
                document.getElementById('boot-btn').style.display = 'inline-block';
            }
        }

        async function scrapeMultipleSubs(subs) {
            let allPosts = [];
            for (let sub of subs) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://www.reddit.com/r/${sub}/hot.json?limit=25`);
                    const json = await res.json();
                    let posts = json.data.children
                        .filter(post => post.data.url.match(/\.(jpeg|jpg|png)$/i))
                        .map(post => ({ url: post.data.url, title: post.data.title }));
                    allPosts = allPosts.concat(posts);
                } catch (e) {
                    console.warn(`Could not fetch r/${sub}`);
                }
            }
            return allPosts.length > 0 ? allPosts : [{url: 'https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=1000&auto=format&fit=crop', title: 'Data Missing...'}];
        }

        function cycleBackground() {
            const val = parseInt(slider.value);
            let activeArray = backgrounds.engineer;
            if (val >= 34 && val < 67) activeArray = backgrounds.paddock;
            if (val >= 67) activeArray = backgrounds.oracle;

            if (activeArray.length > 0) {
                currentBgIndex = (currentBgIndex + 1) % activeArray.length;
                bgLayer.style.backgroundImage = `url('${activeArray[currentBgIndex].url}')`;
            }
        }

        function calculateScores() {
            const val = parseInt(slider.value);
            const V = val / 100.0; 

            scoredDrivers = drivers.map(d => {
                let sBase = 50; 
                if(['Red Bull Racing', 'Ferrari', 'McLaren', 'Mercedes'].includes(d.team_name)) sBase = 85;
                if(d.team_name === 'Aston Martin' || d.team_name === 'RB') sBase = 65;

                let sMeme = ((d.driver_number * 13) % 90) + 10; 
                
                let finalScore = (sBase * (1 - V)) + (sMeme * V);
                
                let wildcardText = "";
                if (V > 0.8 && Math.random() > 0.85) {
                    let swing = (Math.random() > 0.5 ? 150 : -75);
                    finalScore += swing;
                    wildcardText = swing > 0 ? "🔥 VIRAL MEME BUFF" : "💀 TANKED BY REDDIT";
                }

                return { ...d, score: finalScore, wildcard: wildcardText, salary: driverSalaries[d.driver_number] };
            });

            scoredDrivers.sort((a, b) => b.score - a.score);
        }

        window.updateSalary = function(e, driverNum) {
            e.stopPropagation(); // Prevents clicking the card
            let newSalary = parseFloat(e.target.value);
            if (!isNaN(newSalary)) {
                driverSalaries[driverNum] = newSalary;
                saveState();
                calculateScores();
                renderSquad(); // Update budget totals
            }
        }

        window.handleCardClick = function(driverNum) {
            const squadIndex = squad.findIndex(s => s.id === driverNum);
            
            if (squadIndex > -1) {
                // Already in squad, do nothing (user must use Drop button in panel)
                alert("Driver is already in your squad. Manage them in the squad panel.");
                return;
            }

            if (squad.length >= 6) {
                return alert("Your GridRival squad is full (6/6)! Drop a driver first.");
            }

            const driverSal = driverSalaries[driverNum];
            const currentSpent = squad.reduce((acc, s) => acc + driverSalaries[s.id], 0);
            if (budget - currentSpent - driverSal < 0) {
                return alert("Insufficient budget! Update your total budget or choose a cheaper driver.");
            }

            let length = prompt(`Enter contract length for driver #${driverNum} (1-5 races):`, "3");
            if (length === null) return; // Cancelled
            length = parseInt(length);
            
            if (isNaN(length) || length < 1 || length > 5) {
                return alert("Invalid contract length. Must be between 1 and 5.");
            }

            squad.push({ id: driverNum, contractLength: length, racesRemaining: length, isTalent: false });
            saveState();
            renderDrivers();
            renderSquad();
        }

        window.dropDriver = function(driverNum) {
            squad = squad.filter(s => s.id !== driverNum);
            saveState();
            renderDrivers();
            renderSquad();
        }

        window.setTalent = function(driverNum) {
            const driverSal = driverSalaries[driverNum];
            if (driverSal > 18.0) {
                return alert("Talent driver must cost $18.0M or less!");
            }
            squad.forEach(s => s.isTalent = (s.id === driverNum));
            saveState();
            renderSquad();
        }

        window.advanceRace = function() {
            if(confirm("Advance to next race? This will reduce all active contracts by 1.")) {
                squad.forEach(s => {
                    if (s.racesRemaining > 0) s.racesRemaining -= 1;
                });
                saveState();
                renderSquad();
            }
        }

        function getVibeBlurb(d) {
            const val = parseInt(slider.value);
            if (val < 34) {
                return `HISTORICAL SIM: Avg Finish ${(d.driver_number % 10) + 1}.4 | Consistency ${99 - (d.driver_number % 20)}%`;
            } else {
                const arr = val < 67 ? backgrounds.paddock : backgrounds.oracle;
                if (arr.length === 0) return "Loading datastream...";
                // Pick a pseudo-random title based on driver number so it stays static per vibe
                const index = (d.driver_number * 7) % arr.length;
                return `"${arr[index].title}"`;
            }
        }

        function renderDrivers() {
            const grid = document.getElementById('grid-results');
            const val = parseInt(slider.value);
            const V = val / 100.0;

            grid.innerHTML = scoredDrivers.map((d) => {
                let imageSrc = d.headshot_url || 'https://via.placeholder.com/150';
                if (V > 0.66 && backgrounds.oracle.length > 0) {
                    imageSrc = backgrounds.oracle[(d.driver_number * 7) % backgrounds.oracle.length].url;
                }

                const isSelected = squad.some(s => s.id === d.driver_number);
                const borderStyle = isSelected ? `border-color: var(--accent-color)` : `border-color: #${d.team_colour || 'ffffff'}`;
                const blurb = getVibeBlurb(d);

                return `
                <div onclick="handleCardClick(${d.driver_number})" class="glass-panel driver-card p-4 rounded-xl flex items-center space-x-4 border-l-8 ${isSelected ? 'selected-driver' : ''}" style="${borderStyle}">
                    <img src="${imageSrc}" alt="Driver" class="w-20 h-20 rounded-full object-cover border-2 border-gray-600 bg-gray-800">
                    <div class="flex-grow max-w-[50%]">
                        <div class="text-xs font-bold text-gray-400 uppercase">${d.team_name}</div>
                        <h3 class="text-xl font-bold truncate">${d.full_name}</h3>
                        <div class="text-[10px] mt-1 text-gray-300 italic truncate" title='${blurb}'>${blurb}</div>
                        ${d.wildcard ? `<div class="text-xs font-bold text-yellow-400 mt-1">${d.wildcard}</div>` : ''}
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <div class="text-[10px] uppercase tracking-widest text-gray-400">Score</div>
                        <div class="text-2xl font-mono font-bold mb-2" style="color: var(--accent-color)">
                            ${d.score.toFixed(1)}
                        </div>
                        <div class="flex items-center space-x-1" onclick="event.stopPropagation()">
                            <span class="text-xs text-gray-400">$</span>
                            <input type="number" step="0.1" value="${d.salary}" onchange="updateSalary(event, ${d.driver_number})" class="w-16 bg-gray-800 text-white text-xs p-1 border border-gray-600 rounded text-right">
                            <span class="text-xs text-gray-400">M</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderSquad() {
            const squadList = document.getElementById('squad-list');
            const squadTotal = document.getElementById('squad-total');
            const squadHeader = document.getElementById('squad-header');
            const budgetSpentEl = document.getElementById('budget-spent');
            const budgetRemEl = document.getElementById('budget-remaining');
            
            squadHeader.innerText = `Your Squad (${squad.length}/6)`;

            let spent = 0;
            squad.forEach(s => spent += (driverSalaries[s.id] || 0));
            let remaining = budget - spent;

            budgetSpentEl.innerText = `$${spent.toFixed(1)}M`;
            budgetRemEl.innerText = `$${remaining.toFixed(1)}M`;
            budgetRemEl.className = remaining < 0 ? 'font-mono text-red-500 font-bold' : 'font-mono text-green-400 font-bold';

            if (squad.length === 0) {
                squadList.innerHTML = `<div class="text-center text-gray-500 italic py-8">Select drivers from the grid to build your squad.</div>`;
                squadTotal.innerText = "0.0";
                return;
            }

            let totalScore = 0;
            const squadHTML = squad.map(s => {
                const d = scoredDrivers.find(x => x.driver_number === s.id);
                if(!d) return '';
                
                let points = d.score;
                if (s.isTalent) points *= 2;
                totalScore += points;

                const isExpired = s.racesRemaining === 0;
                
                return `
                <div class="bg-black bg-opacity-50 p-3 rounded border ${isExpired ? 'expired-contract' : 'border-gray-700'}">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-sm font-bold">${d.full_name} ${s.isTalent ? '⭐ (TALENT)' : ''}</span>
                            <span class="text-xs text-gray-400 block">${d.team_name} | $${d.salary}M</span>
                            ${isExpired ? `<span class="text-xs font-bold text-red-400 uppercase mt-1 block">Contract Expired</span>` : `<span class="text-xs text-blue-300 block">Races Left: ${s.racesRemaining}/${s.contractLength}</span>`}
                        </div>
                        <div class="text-right">
                            <div class="font-mono text-lg" style="color: var(--accent-color)">${points.toFixed(1)}</div>
                        </div>
                    </div>
                    <div class="flex space-x-2 border-t border-gray-800 pt-2 mt-1">
                        <button onclick="dropDriver(${d.driver_number})" class="text-[10px] bg-red-900 hover:bg-red-700 text-white px-2 py-1 rounded uppercase tracking-wider">Drop/Break</button>
                        ${!s.isTalent && d.salary <= 18.0 ? `<button onclick="setTalent(${d.driver_number})" class="text-[10px] bg-yellow-700 hover:bg-yellow-600 text-white px-2 py-1 rounded uppercase tracking-wider">Set Talent</button>` : ''}
                    </div>
                </div>`;
            }).join('');

            squadList.innerHTML = squadHTML;
            squadTotal.innerText = totalScore.toFixed(1);
        }
    </script>
</body>
</html>
