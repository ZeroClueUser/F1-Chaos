<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos-Caster v5.0 | The War Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #3b82f6; 
            --bg-color: #050505;
            --glass-bg: rgba(10, 15, 25, 0.85);
            --font-main: 'Inter', sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: var(--font-main); 
            margin: 0; 
            overflow-x: hidden;
            transition: font-family 0.4s ease, background-color 0.4s ease;
        }

        #bg-layer { 
            position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; 
            background-size:cover; background-position:center; 
            filter: brightness(0.2) saturate(1.2); 
            transition: background-image 1s ease, filter 0.5s ease; 
        }
        
        .scanlines { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.25)); 
            background-size: 100% 4px; z-index: -1; pointer-events: none; 
            opacity: 0; transition: opacity 0.5s ease; 
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--accent); 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .driver-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
        .driver-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.05); }
        .selected { border: 2px solid var(--accent) !important; box-shadow: 0 0 25px var(--accent); background: rgba(255, 255, 255, 0.08); }
        
        .cost-badge { font-family: 'Courier Prime', monospace; color: #4ade80; background: #000; padding: 3px 8px; border-radius: 4px; border: 1px solid #22c55e; }
        .tier-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .tier-1 { background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid #facc15; }
        .tier-2 { background: rgba(156, 163, 175, 0.2); color: #d1d5db; border: 1px solid #9ca3af; }
        .tier-3 { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 2px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(60% 0 10% 0); transform: translate(-2px, 2px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(0); }
        }
        .glitch-hover:hover .glitch-text { animation: glitch-anim 0.3s infinite; text-shadow: 2px 0 red, -2px 0 blue; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="bg-layer"></div>
    <div class="scanlines" id="scanlines"></div>

    <div id="app" class="max-w-7xl mx-auto">
        <header class="glass p-8 mb-8 text-center border-b-4 relative overflow-hidden" style="border-color: var(--accent)">
            <h1 class="text-5xl font-black uppercase tracking-tighter mb-2" style="color: var(--accent); text-shadow: 0 0 20px var(--accent);">Chaos-Caster</h1>
            <p class="text-xs text-gray-400 tracking-[0.3em] uppercase mb-6">GridRival Fantasy War Room // v5.0</p>
            
            <div class="max-w-xl mx-auto mb-4">
                <input type="range" id="vibe" min="0" max="100" value="0" class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-[10px] font-black mt-3 text-gray-500 uppercase tracking-widest">
                    <span id="label-eng">Telemetry Log</span>
                    <span id="label-pad">Paddock Rumor</span>
                    <span id="label-ora">The Oracle</span>
                </div>
            </div>

            <div id="boot-container" class="mt-8">
                <button onclick="bootSystem()" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-sm font-black uppercase text-sm transition-all shadow-lg border border-blue-400">Initialize Data Link</button>
            </div>
            <p id="status" class="text-[11px] mt-6 text-gray-500 font-mono uppercase tracking-widest">System Offline // Awaiting Boot Sequence</p>
        </header>

        <div id="dashboard" class="flex flex-col lg:flex-row gap-8 hidden">
            <div class="w-full lg:w-2/3">
                <div class="flex justify-between items-end mb-4 border-b border-gray-800 pb-2">
                    <h2 class="text-lg font-black uppercase tracking-widest">Driver Market</h2>
                    <span class="text-xs text-gray-500 font-mono uppercase">Sort: Official Roster</span>
                </div>
                <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="w-full lg:w-1/3 space-y-6">
                <div class="glass p-6">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-2">
                        <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest">Season Ledger</h2>
                        <span class="text-[10px] bg-gray-800 px-2 py-1 rounded font-mono">Week <span id="race-week">1</span></span>
                    </div>
                    <div class="mb-4">
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Available Capital</div>
                        <div id="b-rem" class="text-4xl font-mono font-black text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.3)]">$100.0M</div>
                    </div>
                    <div class="flex justify-between items-center mb-6 bg-black/50 p-3 rounded">
                        <span class="text-xs text-gray-400 uppercase tracking-widest">Squad Value</span>
                        <span id="b-cost" class="text-lg font-mono text-white">$0.0M</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="simulateRace()" class="bg-red-900 hover:bg-red-700 text-red-100 py-3 rounded-sm font-black uppercase text-[10px] tracking-widest transition-all border border-red-500">Simulate Race</button>
                        <button onclick="hardReset()" class="bg-transparent hover:bg-gray-800 text-gray-500 py-3 rounded-sm font-black uppercase text-[10px] tracking-widest transition-all border border-gray-700">Wipe Data</button>
                    </div>
                </div>

                <div class="glass p-6 sticky top-4">
                    <h2 class="text-xs font-black text-gray-400 uppercase mb-4 tracking-widest border-b border-gray-800 pb-2">
                        Active Contracts (<span id="s-count">0</span>/5)
                    </h2>
                    <div id="s-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SAFE STATE MANAGEMENT ---
        const STORAGE_KEY = 'chaos_caster_v5_vault';
        let state = { budget: 100.0, squad: [], week: 1 };
        
        // Wrapped in try/catch to prevent privacy browsers (Brave/Chrome Strict) from crashing the JS
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) state = JSON.parse(saved);
        } catch (e) {
            console.warn("Storage blocked by privacy shields. Running in volatile memory mode.");
        }
        
        let drivers = [];
        let assets = { eng: [], pad: [], ora: [] };

        function saveState() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } 
            catch (e) { /* Ignore if blocked */ }
        }

        function hardReset() {
            if(confirm("CRITICAL WARNING: This will terminate all contracts and reset your budget to $100M. Proceed?")) {
                try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
                location.reload();
            }
        }

        // --- 2. BULLETPROOF DATA PIPELINE ---
        async function bootSystem() {
            // Hide button and show dashboard immediately to prove UI isn't hanging
            document.getElementById('boot-container').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('status').innerText = "Establishing Secure Telemetry Link...";
            
            let rawDrivers = [];
            
            try {
                // Fetch Grid Ground Truth
                const res = await fetch('https://api.openf1.org/v1/drivers');
                if(!res.ok) throw new Error("API Offline");
                rawDrivers = await res.json();
            } catch (e) {
                // FALLBACK ROSTER if browser blocks the API or API is down
                document.getElementById('status').innerText = "API BLOCKED. Initializing Offline Simulation Roster...";
                rawDrivers = [
                    { driver_number: 1, last_name: 'Verstappen', team_name: 'Red Bull Racing', team_colour: '3671C6' },
                    { driver_number: 4, last_name: 'Norris', team_name: 'McLaren', team_colour: 'FF8000' },
                    { driver_number: 16, last_name: 'Leclerc', team_name: 'Ferrari', team_colour: 'E8002D' },
                    { driver_number: 44, last_name: 'Hamilton', team_name: 'Ferrari', team_colour: 'E8002D' },
                    { driver_number: 81, last_name: 'Piastri', team_name: 'McLaren', team_colour: 'FF8000' },
                    { driver_number: 63, last_name: 'Russell', team_name: 'Mercedes', team_colour: '27F4D2' },
                    { driver_number: 14, last_name: 'Alonso', team_name: 'Aston Martin', team_colour: '229971' },
                    { driver_number: 55, last_name: 'Sainz', team_name: 'Williams', team_colour: '37BEDD' },
                    { driver_number: 22, last_name: 'Tsunoda', team_name: 'RB', team_colour: '6692FF' },
                    { driver_number: 27, last_name: 'Hulkenberg', team_name: 'Haas', team_colour: 'B6BABD' }
                ];
            }

            // Process and Tier Drivers
            drivers = Array.from(new Set(rawDrivers.map(d => d.driver_number)))
                .map(n => rawDrivers.find(d => d.driver_number === n))
                .filter(d => d && d.last_name) 
                .slice(0, 20).map(d => {
                    const cost = calculateBaseCost(d);
                    return {
                        ...d, 
                        cost: cost,
                        tier: cost >= 22 ? 1 : (cost >= 14 ? 2 : 3),
                        team_colour: d.team_colour || '555555',
                        headshot: d.headshot_url || `https://ui-avatars.com/api/?name=${d.first_name || d.last_name}+${d.last_name}&background=${d.team_colour || '000'}&color=fff&size=200`
                    };
                });

            try {
                // Background Reddit Asset Fetching
                document.getElementById('status').innerText = "Scraping Paddock Intel...";
                const [pad, ora] = await Promise.all([
                    scrapeReddit(['formula1', 'F1Porn']),
                    scrapeReddit(['formuladank', 'f1circlejerk'])
                ]);
                assets.pad = pad; assets.ora = ora;
            } catch(e) {
                console.warn("Reddit Scrapers Blocked. Proceeding with generative text.");
            }

            // Bind UI Event & Render
            document.getElementById('vibe').addEventListener('input', updateUI);
            updateUI(); 
        }

        function calculateBaseCost(d) {
            const elites = ['Verstappen', 'Norris', 'Leclerc', 'Hamilton'];
            if (elites.includes(d.last_name)) return 26.0 + (d.driver_number % 3);
            if (d.team_name?.includes('McLaren') || d.team_name?.includes('Ferrari') || d.team_name?.includes('Red Bull')) return 18.0 + (d.driver_number % 4);
            return 8.5 + (d.driver_number % 5);
        }

        async function scrapeReddit(subs) {
            let posts = [];
            for (let s of subs) {
                try {
                    const r = await fetch(`https://api.allorigins.win/raw?url=https://www.reddit.com/r/${s}/hot.json?limit=15`);
                    if(!r.ok) continue;
                    const j = await r.json();
                    let valid = j.data.children
                        .filter(x => x.data.url.match(/\.(jpg|png|jpeg)$/i))
                        .map(x => ({u: x.data.url, t: x.data.title}));
                    posts = posts.concat(valid);
                } catch(e) {}
            }
            return posts;
        }

        // --- 3. THE SYNTHESIS ENGINE (Blurbs & UI) ---
        function generateBlurb(driver, vibeLevel) {
            const seed = driver.driver_number;
            const loreDict = [
                "Aero correlation issues in the wind tunnel.", "Complaining about tire temps.", 
                "Sandbagging the speed trap.", "Simulator data implies +0.2s advantage.",
                "Radio: 'The car is undriveable!'", "Spotted leaving the hospitality suite early.",
                "Contract rumors intensify ahead of FP1.", "Floor upgrade showing massive downforce gains."
            ];
            const baseLore = loreDict[seed % loreDict.length];

            if (vibeLevel < 34) {
                return `<span class="text-blue-400 font-bold">[LOG_DECRYPTED]:</span> ${baseLore} Cross-referencing Sector 2 telemetry.`;
            } else if (vibeLevel < 67) {
                const title = assets.pad.length ? assets.pad[seed % assets.pad.length].t : baseLore;
                return `<span class="text-pink-400 italic">"Whisper: Heard in the paddock... ${title.substring(0, 50)}..."</span>`;
            } else {
                const title = assets.ora.length ? assets.ora[seed % assets.ora.length].t : "THE VOID CONSUMES ALL REASON.";
                return `<span class="text-green-500 font-black glitch-text">!! THE PROPHECY !! ${title.toUpperCase()}</span>`;
            }
        }

        function updateUI() {
            const v = document.getElementById('vibe').value;
            const root = document.documentElement.style;
            
            let currentMode = 0; 

            if (v < 34) {
                root.setProperty('--accent', '#3b82f6'); 
                root.setProperty('--glass-bg', 'rgba(10, 15, 25, 0.9)');
                root.setProperty('--font-main', "'Inter', sans-serif");
                document.getElementById('scanlines').style.opacity = '0';
                document.getElementById('bg-layer').style.filter = 'brightness(0.2) saturate(1)';
            } else if (v < 67) {
                currentMode = 1;
                root.setProperty('--accent', '#ec4899'); 
                root.setProperty('--glass-bg', 'rgba(25, 10, 20, 0.85)');
                root.setProperty('--font-main', "'Playfair Display', serif");
                document.getElementById('scanlines').style.opacity = '0.3';
                document.getElementById('bg-layer').style.filter = 'brightness(0.3) saturate(1.5) sepia(0.3)';
            } else {
                currentMode = 2;
                root.setProperty('--accent', '#22c55e'); 
                root.setProperty('--glass-bg', 'rgba(10, 25, 15, 0.8)');
                root.setProperty('--font-main', "'Courier Prime', monospace");
                document.getElementById('scanlines').style.opacity = '0.8';
                document.getElementById('bg-layer').style.filter = 'brightness(0.4) saturate(2) contrast(1.2) hue-rotate(-20deg)';
            }

            renderGrid(currentMode, v);
            renderSquad();
        }

        function renderGrid(mode, rawVibe) {
            const g = document.getElementById('grid');
            
            g.innerHTML = drivers.map(d => {
                const isSelected = state.squad.includes(d.driver_number);
                const blurb = generateBlurb(d, rawVibe);
                
                let displayImage = d.headshot; 
                if (mode === 1 && assets.pad.length) displayImage = assets.pad[(d.driver_number * 3) % assets.pad.length].u;
                if (mode === 2 && assets.ora.length) displayImage = assets.ora[(d.driver_number * 7) % assets.ora.length].u;

                const isSteal = d.tier === 3 && (d.driver_number % 2 === 0);
                const hypeArrow = isSteal ? '<span class="trend-up ml-1 text-green-400">▲</span>' : '<span class="trend-down ml-1 text-red-500">▼</span>';

                return `
                <div onclick="toggleContract(${d.driver_number})" class="glass p-4 flex items-center gap-4 driver-card ${isSelected?'selected':''} ${mode === 2 ? 'glitch-hover' : ''}" style="border-left: 5px solid #${d.team_colour}">
                    <div class="relative min-w-[64px]">
                        <img src="${displayImage}" class="w-16 h-16 rounded-sm object-cover border border-gray-700 bg-gray-900 z-10 relative shadow-xl" loading="lazy">
                        ${mode === 2 ? `<div class="absolute inset-0 bg-green-500 opacity-20 mix-blend-overlay"></div>` : ''}
                    </div>
                    
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-start mb-1">
                            <div>
                                <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest block leading-none mb-1">${d.team_name}</span>
                                <h3 class="font-bold text-lg leading-none uppercase tracking-tighter truncate">${d.last_name}</h3>
                            </div>
                            <div class="text-right">
                                <span class="cost-badge text-[10px] font-bold block">$${d.cost.toFixed(1)}M ${hypeArrow}</span>
                                <span class="tier-badge tier-${d.tier} mt-1 inline-block">Tier ${d.tier}</span>
                            </div>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-2 leading-snug line-clamp-2 border-t border-gray-800/50 pt-2">${blurb}</p>
                    </div>
                </div>`;
            }).join('');
        }

        function renderSquad() {
            const sl = document.getElementById('s-list');
            let currentTotalCost = 0;
            
            sl.innerHTML = state.squad.map(id => {
                const d = drivers.find(x => x.driver_number === id);
                if(!d) return '';
                currentTotalCost += d.cost;
                return `
                <div class="flex justify-between items-center p-3 bg-black/60 rounded-sm border-l-4 shadow-inner" style="border-color: #${d.team_colour}">
                    <div>
                        <div class="text-[11px] font-black text-gray-300 uppercase">${d.last_name}</div>
                        <div class="text-[8px] text-gray-500 uppercase tracking-widest">${d.team_name}</div>
                    </div>
                    <span class="text-xs font-mono text-green-400 font-bold">$${d.cost.toFixed(1)}M</span>
                </div>`;
            }).join('') || '<div class="text-center text-gray-600 py-8 text-[10px] uppercase tracking-widest italic border border-dashed border-gray-800 rounded">No Active Signings</div>';
            
            document.getElementById('s-count').innerText = state.squad.length;
            document.getElementById('b-cost').innerText = `$${currentTotalCost.toFixed(1)}M`;
            document.getElementById('b-rem').innerText = `$${state.budget.toFixed(1)}M`;
            document.getElementById('race-week').innerText = state.week;
            
            const v = document.getElementById('vibe').value;
            const modeName = v < 34 ? "TELEMETRY" : (v < 67 ? "PADDOCK" : "ORACLE");
            document.getElementById('status').innerText = `Uplink Active // Filter: ${modeName} // Security Overrides Engaged`;
        }

        window.toggleContract = (n) => {
            const d = drivers.find(x => x.driver_number === n);
            const currentCost = state.squad.reduce((a, b) => a + (drivers.find(x => x.driver_number === b)?.cost || 0), 0);
            
            if (state.squad.includes(n)) {
                state.squad = state.squad.filter(x => x !== n);
            } else {
                if (state.squad.length >= 5) return alert("FIA REGULATION BREACH: Maximum 5 drivers allowed per squad.");
                if (currentCost + d.cost > state.budget) return alert("FINANCIAL FAIR PLAY BREACH: Insufficient Capital to execute contract.");
                state.squad.push(n);
            }
            saveState(); 
            updateUI();
        };

        window.simulateRace = () => {
            if(state.squad.length < 5) return alert("RACE CONTROL: Full 5-driver grid required to begin simulation.");
            const marketSwing = (Math.random() * 8) - 3.5; 
            state.budget += marketSwing;
            state.week += 1;
            saveState(); 
            const resultText = marketSwing >= 0 ? `PROFIT: +$${marketSwing.toFixed(1)}M` : `LOSS: -$${Math.abs(marketSwing).toFixed(1)}M`;
            alert(`RACE WEEK ${state.week - 1} COMPLETE.\nMarket Sentiment Shifted.\nNet Portfolio Change: ${resultText}`);
            updateUI();
        };

    </script>
</body>
</html>
