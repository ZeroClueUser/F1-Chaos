<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 GridRival Chaos-Caster V4 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-color: #3b82f6; 
            --panel-bg: rgba(15, 23, 42, 0.85);
            --font-main: 'ui-sans-serif', system-ui, sans-serif;
        }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            transition: font-family 0.3s ease;
        }

        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1s ease-in-out, filter 0.5s ease;
            filter: brightness(0.4);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
        }

        input[type=range] {
            accent-color: var(--accent-color);
        }

        .driver-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .driver-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .selected-driver {
            border: 2px solid var(--accent-color) !important;
            background: rgba(255, 255, 255, 0.1);
        }
        .cost-tag {
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #4ade80;
        }
    </style>
</head>
<body class="p-6">

    <div id="bg-layer"></div>

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-2/3">
            <header class="glass-panel p-6 rounded-xl mb-6 text-center">
                <h1 class="text-4xl font-extrabold mb-4 uppercase tracking-wider" style="color: var(--accent-color)">
                    Chaos-Caster Engine
                </h1>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 uppercase tracking-widest text-gray-300">
                        Vibe Level: <span id="vibe-label" class="text-white">0% (The Engineer)</span>
                    </label>
                    <input type="range" id="vibe-slider" min="0" max="100" value="0" class="w-full h-3 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <div class="flex justify-between text-xs text-gray-400 font-mono uppercase mb-6">
                    <span>Pure Stats</span>
                    <span>Hype / Lifestyle</span>
                    <span>Reddit Chaos</span>
                </div>

                <button onclick="bootEngine()" id="boot-btn" class="px-8 py-3 rounded font-bold text-white uppercase tracking-wider transition-all hover:scale-105" style="background-color: var(--accent-color)">
                    Initialize System
                </button>
                <div id="status" class="mt-4 font-mono text-sm text-gray-400 italic">Awaiting initialization...</div>
            </header>

            <div id="grid-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div class="w-full lg:w-1/3 space-y-6">
            <div class="glass-panel p-6 rounded-xl">
                <h2 class="text-xl font-bold uppercase mb-2 border-b border-gray-600 pb-2 text-gray-300">Season Portfolio</h2>
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm text-gray-400 uppercase">Available Budget</span>
                    <span id="budget-display" class="text-3xl font-mono font-bold text-green-400">$100.0M</span>
                </div>
                <div class="flex justify-between items-end mb-4">
                    <span class="text-sm text-gray-400 uppercase">Squad Cost</span>
                    <span id="squad-cost-display" class="text-xl font-mono text-white">$0.0M</span>
                </div>
                <button onclick="processRace()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded uppercase text-sm tracking-widest">
                    🏁 Simulate Next Race
                </button>
            </div>

            <div class="glass-panel p-6 rounded-xl sticky top-6">
                <h2 class="text-2xl font-bold uppercase mb-2 border-b border-gray-600 pb-2" style="color: var(--accent-color)">
                    Active Squad (<span id="squad-count">0</span>/5)
                </h2>
                <div class="flex justify-between items-end mb-4">
                    <span class="text-sm text-gray-400 uppercase">Predicted Points</span>
                    <span id="squad-total" class="text-4xl font-mono font-bold" style="color: var(--accent-color)">0.0</span>
                </div>
                <div id="squad-list" class="space-y-3">
                    <div class="text-center text-gray-500 italic py-8">Initialize to build squad.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = { budget: 100.0, squad: [] };
        let drivers = [];
        let scoredDrivers = [];
        let backgrounds = { engineer: [], paddock: [], oracle: [] };
        let currentBgIndex = 0;

        const slider = document.getElementById('vibe-slider');
        const vibeLabel = document.getElementById('vibe-label');
        const bgLayer = document.getElementById('bg-layer');
        const rootStyles = document.documentElement.style;

        slider.addEventListener('input', (e) => {
            updateVibeState(parseInt(e.target.value));
            if(drivers.length > 0) {
                calculateScores();
                renderDrivers();
                renderSquad();
            }
        });

        function updateVibeState(val) {
            if (val < 34) {
                vibeLabel.innerText = `${val}% (The Engineer)`;
                rootStyles.setProperty('--accent-color', '#3b82f6');
                rootStyles.setProperty('--panel-bg', 'rgba(15, 23, 42, 0.85)');
                bgLayer.style.filter = "brightness(0.4) saturate(1)";
            } else if (val < 67) {
                vibeLabel.innerText = `${val}% (The Paddock)`;
                rootStyles.setProperty('--accent-color', '#ec4899');
                rootStyles.setProperty('--panel-bg', 'rgba(88, 28, 135, 0.80)');
                bgLayer.style.filter = "brightness(0.5) saturate(1.5)";
            } else {
                vibeLabel.innerText = `${val}% (The Oracle)`;
                rootStyles.setProperty('--accent-color', '#22c55e');
                rootStyles.setProperty('--panel-bg', 'rgba(0, 0, 0, 0.90)');
                bgLayer.style.filter = "brightness(0.6) contrast(1.2) saturate(2)";
            }
            cycleBackground();
        }

        async function bootEngine() {
            document.getElementById('status').innerText = "Connecting to OpenF1...";
            document.getElementById('boot-btn').style.display = 'none';
            
            try {
                const dRes = await fetch('https://api.openf1.org/v1/drivers');
                const rawDrivers = await dRes.json();
                drivers = Array.from(new Set(rawDrivers.map(a => a.driver_number)))
                    .map(num => rawDrivers.find(a => a.driver_number === num))
                    .filter(d => d.driver_number).slice(0, 20);

                // Assign Price Logic
                drivers.forEach(d => {
                    const top = ['Verstappen', 'Norris', 'Leclerc', 'Hamilton'];
                    d.cost = top.includes(d.last_name) ? 28.5 : (d.driver_number % 2 === 0 ? 15.2 : 8.4);
                });

                document.getElementById('status').innerText = "Scraping Reddit Assets...";
                const [eng, pad, ora] = await Promise.all([
                    scrapeReddit(['F1Porn', 'f1technical']),
                    scrapeReddit(['formula1', 'GrandPrixRacing']),
                    scrapeReddit(['formuladank'])
                ]);

                backgrounds.engineer = eng; backgrounds.paddock = pad; backgrounds.oracle = ora;

                document.getElementById('status').innerText = "Online.";
                updateVibeState(slider.value);
                calculateScores();
                renderDrivers();
                renderSquad();
            } catch (err) {
                document.getElementById('status').innerText = "Failed. Check CORS.";
            }
        }

        async function scrapeReddit(subs) {
            let posts = [];
            for (let sub of subs) {
                try {
                    const res = await fetch(`https://api.allorigins.win/raw?url=https://www.reddit.com/r/${sub}/hot.json?limit=25`);
                    const json = await res.json();
                    let valid = json.data.children
                        .filter(p => p.data.url.match(/\.(jpeg|jpg|png)$/i))
                        .map(p => ({ url: p.data.url, title: p.data.title }));
                    posts = posts.concat(valid);
                } catch (e) {}
            }
            return posts.length > 0 ? posts : [{url: 'https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=1000', title: 'Default'}];
        }

        function cycleBackground() {
            const val = parseInt(slider.value);
            let arr = val < 34 ? backgrounds.engineer : (val < 67 ? backgrounds.paddock : backgrounds.oracle);
            if (arr.length > 0) {
                currentBgIndex = (currentBgIndex + 1) % arr.length;
                bgLayer.style.backgroundImage = `url('${arr[currentBgIndex].url}')`;
            }
        }

        function calculateScores() {
            const val = parseInt(slider.value);
            const V = val / 100.0;
            scoredDrivers = drivers.map(d => {
                let sBase = (35 - d.cost) * 2.5;
                let sMeme = ((d.driver_number * 17) % 80) + 20;
                let final = (sBase * (1 - V)) + (sMeme * V);
                
                let arr = val < 34 ? backgrounds.engineer : (val < 67 ? backgrounds.paddock : backgrounds.oracle);
                let post = arr[(d.driver_number * 3) % arr.length];
                let blurb = val > 66 ? `Reddit says: "${post.title}"` : `Statistically P${(d.driver_number % 10) + 1} pace predicted.`;

                return { ...d, score: final, blurb: blurb, currentImg: post.url };
            }).sort((a,b) => b.score - a.score);
        }

        window.toggleSquad = function(num) {
            const d = scoredDrivers.find(x => x.driver_number === num);
            const cost = state.squad.reduce((s, id) => s + scoredDrivers.find(x => x.driver_number === id).cost, 0);

            if (state.squad.includes(num)) {
                state.squad = state.squad.filter(id => id !== num);
            } else {
                if (state.squad.length >= 5) return alert("Full!");
                if (cost + d.cost > state.budget) return alert("Too expensive!");
                state.squad.push(num);
            }
            renderDrivers(); renderSquad(); updateBudgetDisplay();
        }

        function updateBudgetDisplay() {
            document.getElementById('budget-display').innerText = `$${state.budget.toFixed(1)}M`;
            const cost = state.squad.reduce((s, id) => s + scoredDrivers.find(x => x.driver_number === id).cost, 0);
            document.getElementById('squad-cost-display').innerText = `$${cost.toFixed(1)}M`;
        }

        function renderDrivers() {
            const grid = document.getElementById('grid-results');
            grid.innerHTML = scoredDrivers.map(d => `
                <div onclick="toggleSquad(${d.driver_number})" class="glass-panel driver-card p-4 rounded-xl flex items-center space-x-4 border-l-8 ${state.squad.includes(d.driver_number) ? 'selected-driver' : ''}" style="border-color: #${d.team_colour}">
                    <img src="${d.currentImg}" class="w-16 h-16 rounded-full object-cover bg-gray-800 border">
                    <div class="flex-grow">
                        <div class="flex justify-between">
                            <span class="text-[10px] text-gray-400 uppercase">${d.team_name}</span>
                            <span class="cost-tag">$${d.cost}M</span>
                        </div>
                        <h3 class="font-bold">${d.full_name}</h3>
                        <p class="text-[10px] italic text-gray-500">${d.blurb}</p>
                    </div>
                    <div class="text-right font-mono font-bold text-2xl" style="color: var(--accent-color)">${d.score.toFixed(0)}</div>
                </div>
            `).join('');
        }

        function renderSquad() {
            document.getElementById('squad-count').innerText = state.squad.length;
            const list = document.getElementById('squad-list');
            let total = 0;
            list.innerHTML = state.squad.map(id => {
                const d = scoredDrivers.find(x => x.driver_number === id);
                total += d.score;
                return `<div class="bg-black p-2 rounded flex justify-between text-sm border border-gray-800">
                    <span>${d.full_name}</span><span>${d.score.toFixed(0)}</span>
                </div>`;
            }).join('') || '<div class="text-center text-gray-500 italic py-8">Select 5 drivers</div>';
            document.getElementById('squad-total').innerText = total.toFixed(0);
        }

        window.processRace = function() {
            state.budget += (Math.random() * 4) - 1.5;
            updateBudgetDisplay();
            alert("Race complete! Budget updated.");
        }
    </script>
</body>
</html>
